task_version: "1.2"
package: "agv_waypoint_manager"
owner_role: "architect_agent"
language: "C++17"

# Sprint B (2026-05-13 audit, HIGH-11-B-01): this package is NO LONGER
# launched by agv_full.launch.py. The dashboard executes missions in
# agv_ui_backend/src/index.ts::executeMission, which routes every
# waypoint through ros.sendNavGoal (and therefore the localization /
# motors-armed / collision-monitor gates). This package's
# /agv/waypoint_manager/execute service still exists for CLI / test
# callers, but production never starts the node. Do NOT add this
# package back to agv_full.launch.py without refactoring its
# execute path to route through the backend's gates.
production_status: "removed_from_production_launch"
production_status_since: "2026-05-13"
production_status_reason: "HIGH-11-B-01 / Sprint B — dashboard uses its own gated executor"

objective: "Store, list, and dispatch waypoints and missions based on operator-defined map clicks and mission composition."

inputs:
  persistent_storage:
    - "missions.json"
  upstream_events:
    - "UI waypoint creation"
    - "mission creation requests"

outputs:
  services:
    - "/{robot_namespace}/waypoint_manager/save"
    - "/{robot_namespace}/waypoint_manager/list"
    - "/{robot_namespace}/waypoint_manager/execute"

rules:
  - "No hardcoded missions in source code"
  - "Mission schema must be stable and versionable"
  - "Waypoint coordinates must remain in map-space meters"
  - "Current MVP mission model is ordered waypoints with metadata, not full fleet-level task orchestration"

done_definition:
  - "CRUD operations on missions work correctly"
  - "mission serialization and deserialization are stable"
  - "execute service dispatches canonical mission flow"
