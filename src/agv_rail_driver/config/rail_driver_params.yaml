rail_driver:
  ros__parameters:
    odom_topic: /agv/odometry/global
    goal_topic: /agv/rail_driver/goal
    zone_topic: /agv/zone/state
    collision_topic: /agv/collision_monitor_state
    cmd_vel_topic: /agv/cmd_vel_rail
    state_topic: /agv/rail_driver/state
    publish_rate_hz: 20.0
    kP: 1.0
    # In HIL the drive efficiency is ~5-20 % of command. speed_max_mps=1.0
    # yields ~0.05-0.2 m/s real motion, comparable to Nav2's in-gap runs.
    # Production robot should drop this to 0.25 once on real hardware.
    speed_max_mps: 1.0
    stop_band_m: 0.05
    lateral_abort_m: 0.30
    # 0.35 rad ≈ 20°. Iter-26c: raised from 0.26 to leave ~6° margin over
    # rail_approach's settle gate (tolerance_yaw=0.25). Previously the
    # two values were almost identical, so a fine_servo that barely
    # settled at the edge tripped BLOCKED_MISALIGNED on the first
    # rail_drive tick. Robot geometry still tolerates ~36° before a
    # wheel snags a rail tube, so 20° stays well under the hard limit.
    yaw_abort_rad: 0.35
