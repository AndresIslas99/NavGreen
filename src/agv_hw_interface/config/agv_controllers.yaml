# controller_manager + diff_drive_controller + joint_state_broadcaster
#
# Wheel geometry MUST match agv_bringup/config/robot/agv_geometry.yaml. Once
# Gap 3's migration completes, the controller_manager itself will load
# agv_geometry.yaml and these values will be removed from here.

/**/controller_manager:
  ros__parameters:
    update_rate: 50  # Hz — match the existing agv_odrive publish rate

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

/**/diff_drive_controller:
  ros__parameters:
    left_wheel_names: ["left_wheel_joint"]
    right_wheel_names: ["right_wheel_joint"]

    wheel_separation: 0.960    # track_width_m, see agv_geometry.yaml
    wheel_radius: 0.0781       # see agv_geometry.yaml
    wheel_separation_multiplier: 1.0
    left_wheel_radius_multiplier: 1.0
    right_wheel_radius_multiplier: 1.0

    publish_rate: 50.0
    odom_frame_id: odom
    base_frame_id: base_link
    pose_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]

    # The dual-EKF stack owns map->odom and odom->base_link, so the
    # diff_drive_controller MUST NOT publish TF — it only publishes
    # /odom (Odometry topic), which ekf_local consumes as a wheel odom source.
    enable_odom_tf: false
    open_loop: false
    position_feedback: true

    cmd_vel_timeout: 0.2
    publish_limited_velocity: true
    use_stamped_vel: false

    linear:
      x:
        max_velocity: 0.4         # match Nav2 vx_max
        min_velocity: -0.4
        max_acceleration: 0.5
        min_acceleration: -1.5    # 3x faster decel (match agv_odrive shaping)

    angular:
      z:
        max_velocity: 1.5
        min_velocity: -1.5
        max_acceleration: 2.0
        min_acceleration: -2.0
