# Waypoints — TRUE CORRIDOR ONLY (11 waypoints, all x<5.5)
#
# 2026-04-18 v2 after operator confirmed actual rail geometry:
#   rails at x ∈ [6.0, 26.0], pair_spacing 0.45 m in each aisle.
# The previous "east-open" waypoints at x=10-20 were INSIDE aisle 3 rails,
# not in open space. Those failed with err_yaw up to 60° because MPPI
# tried to rotate around phantom obstacles and snagged on rails.
#
# This file contains ONLY waypoints strictly west of x=5.5 (rail start −0.5 m margin).
# All y values are chosen to stay clear of crop rows at y=±1.1, ±3.3, ±5.5
# (width 0.5 m each) — usable y bands: (−5.0, −3.8), (−2.8, −1.6), (−0.6, +0.6),
# (+1.6, +2.8), (+3.8, +5.0). We use the y=0 band and y=±2 band.
#
# Static obstacles to avoid:
#   Crate1 (3.5, −2.0): avoid x∈[3.0, 4.0], y∈[−2.5, −1.5]
#   Crate2 (4.0, +3.5): avoid x∈[3.5, 4.5], y∈[+3.0, +4.0]
# None of our waypoints are near these crates.

waypoints:
  # ── Phase A: short probes y=0 (dominant success pattern in rounds 28/34c) ──
  - {id: wp01, start: {x: -0.5, y: 0.0, yaw: 0.0}, goal: {x:  0.0, y: 0.0, yaw: 0.0}}  # 0.5 m
  - {id: wp02, start: {x:  0.0, y: 0.0, yaw: 0.0}, goal: {x:  1.0, y: 0.0, yaw: 0.0}}  # 1.0 m
  - {id: wp03, start: {x: -1.0, y: 0.0, yaw: 0.0}, goal: {x:  1.0, y: 0.0, yaw: 0.0}}  # 2.0 m (long)
  - {id: wp04, start: {x:  0.0, y: 0.0, yaw: 0.0}, goal: {x:  0.5, y: 0.0, yaw: 0.0}}  # 0.5 m repeat

  # ── Phase B: y=±2 offset lanes (inside the crop-row clear band (-2.8, -1.6) and (+1.6, +2.8)) ──
  - {id: wp05, start: {x:  0.0, y:  2.0, yaw: 0.0}, goal: {x:  2.0, y:  2.0, yaw: 0.0}}  # 2 m y=+2
  - {id: wp06, start: {x:  0.0, y: -2.0, yaw: 0.0}, goal: {x:  2.0, y: -2.0, yaw: 0.0}}  # 2 m y=-2

  # ── Phase C: yaw arcs (RotationShim stress test, 5.7° heading changes) ──
  - {id: wp07, start: {x: -2.0, y:  0.0, yaw:  0.0997}, goal: {x:  0.0, y:  0.2, yaw:  0.0997}}
  - {id: wp08, start: {x:  0.0, y:  0.0, yaw: -0.0997}, goal: {x:  2.0, y: -0.2, yaw: -0.0997}}

  # ── Phase D: short probe repeats (stabilize the p95 sample) ──
  - {id: wp09, start: {x:  0.0, y: 0.0, yaw: 0.0}, goal: {x:  1.5, y: 0.0, yaw: 0.0}}  # 1.5 m
  - {id: wp10, start: {x:  1.0, y: 0.0, yaw: 0.0}, goal: {x:  2.5, y: 0.0, yaw: 0.0}}  # 1.5 m offset
  - {id: wp11, start: {x:  0.0, y: 2.0, yaw: 0.0}, goal: {x:  1.0, y: 2.0, yaw: 0.0}}  # 1.0 m offset
