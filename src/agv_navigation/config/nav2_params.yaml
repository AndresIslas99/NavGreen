# Nav2 parameters for AGV greenhouse — real hardware mode
#
# Parameter categories:
#   [TUNABLE]       Safe to adjust during field commissioning
#   [ARCHITECTURAL] Do not change without understanding Nav2 internals
#   [FIXED]         Tied to hardware or system design; change requires validation
#
# For HIL/sim mode, use nav2_hil_overrides.yaml to override frequencies/tolerances.
#
# Planner: SmacPlanner2D (flat greenhouse floor)
# Controller: RegulatedPurePursuit (smooth, predictable)
# No AMCL — dual EKF owns map->odom and odom->base_link

/**/bt_navigator:
  ros__parameters:
    global_frame: map                    # [FIXED] Must match ekf_global world_frame
    robot_base_frame: base_link          # [FIXED] Must match URDF base link
    odom_topic: odometry/global          # [FIXED] From ekf_global output
    bt_loop_duration: 10                 # [ARCHITECTURAL] BT tick period (ms)
    default_server_timeout: 20           # [ARCHITECTURAL] Action server timeout (s)
    navigators: ['navigate_to_pose']
    navigate_to_pose:
      plugin: "nav2_bt_navigator/NavigateToPoseNavigator"

/**/controller_server:
  ros__parameters:
    controller_frequency: 20.0           # [ARCHITECTURAL] Must be >= EKF rate. Do not lower below 10.
    min_x_velocity_threshold: 0.001      # [FIXED] Dead zone threshold
    min_y_velocity_threshold: 0.5        # [FIXED] Differential drive: no lateral motion
    min_theta_velocity_threshold: 0.001  # [FIXED] Dead zone threshold
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5      # [TUNABLE] [0.3-1.0] m — lower if robot crawls in tight spaces
      movement_time_allowance: 10.0      # [TUNABLE] [5-20] s — increase if robot needs time to maneuver

    general_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.15            # [TUNABLE] [0.10-0.25] m — tighten for precision, loosen for speed
      yaw_goal_tolerance: 0.25           # [TUNABLE] [0.15-0.40] rad — tighten if heading matters at goal

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.3            # [TUNABLE] [0.1-0.5] m/s — reduce for tight rows or wet floors
      lookahead_dist: 0.4               # [TUNABLE] [0.2-0.7] m — increase for straighter paths in open areas
      min_lookahead_dist: 0.2            # [TUNABLE] [0.15-0.3] m — floor for lookahead scaling
      max_lookahead_dist: 0.7            # [TUNABLE] [0.5-1.0] m — ceiling for lookahead scaling
      lookahead_time: 1.2                # [TUNABLE] [0.8-2.0] s — higher = smoother but less reactive
      rotate_to_heading_angular_vel: 0.2 # [TUNABLE] [0.2-0.5] rad/s — in-place rotation speed
      transform_tolerance: 0.2           # [ARCHITECTURAL] Must match TF publish rates; 0.5 for sim
      use_velocity_scaled_lookahead_dist: true   # [ARCHITECTURAL] Scales lookahead with speed
      min_approach_linear_velocity: 0.05 # [TUNABLE] [0.03-0.10] m/s — final approach creep speed
      approach_velocity_scaling_dist: 0.6 # [TUNABLE] [0.3-1.0] m — distance to start slowing for goal
      use_collision_detection: true       # [ARCHITECTURAL] Required for safe operation
      max_allowed_time_to_collision_up_to_carrot: 1.5  # [ARCHITECTURAL] Collision lookahead (s)
      use_regulated_linear_velocity_scaling: true       # [ARCHITECTURAL] Scale speed near obstacles
      use_cost_regulated_linear_velocity_scaling: true   # [ARCHITECTURAL] Scale speed by costmap cost
      cost_scaling_dist: 0.6             # [ARCHITECTURAL] Costmap cost influence distance
      cost_scaling_gain: 1.0             # [ARCHITECTURAL] Costmap cost scaling factor
      regulated_linear_scaling_min_radius: 0.9   # [ARCHITECTURAL] Min turn radius for speed scaling
      regulated_linear_scaling_min_speed: 0.1    # [TUNABLE] [0.05-0.15] m/s — minimum regulated speed
      max_angular_accel: 0.8             # [TUNABLE] [0.5-1.5] rad/s^2 — limit angular jerk
      allow_reversing: false             # [FIXED] Differential drive forward-only in greenhouse rows

/**/planner_server:
  ros__parameters:
    expected_planner_frequency: 5.0      # [ARCHITECTURAL] Planning rate (Hz)
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner/SmacPlanner2D"
      tolerance: 0.125                   # [TUNABLE] [0.05-0.25] m — goal search tolerance
      downsample_costmap: false          # [ARCHITECTURAL] Keep full resolution
      downsampling_factor: 1             # [ARCHITECTURAL] No downsampling
      allow_unknown: true                # [TUNABLE] Allow planning through unknown space
      max_iterations: 1000000            # [ARCHITECTURAL] Search limit
      max_on_approach_iterations: 1000   # [ARCHITECTURAL] Near-goal refinement
      max_planning_time: 2.0             # [ARCHITECTURAL] Timeout (s). Increase if plans fail.
      cost_travel_multiplier: 2.0        # [TUNABLE] [1.0-4.0] — higher prefers shorter paths
      use_final_approach_orientation: false  # [FIXED] Goal orientation from request, not path
      smoother:
        max_iterations: 1000             # [ARCHITECTURAL]
        w_smooth: 0.3                    # [ARCHITECTURAL] Smoothing weight
        w_data: 0.2                      # [ARCHITECTURAL] Data fidelity weight
        tolerance: 1.0e-10               # [ARCHITECTURAL]

# --- Costmap configuration ---
# Footprint: front=0.50m, rear=0.30m, left=0.37m, right=0.37m
# Total: 0.80m x 0.74m rectangle

/**/local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0              # [ARCHITECTURAL] Local costmap refresh (Hz)
      publish_frequency: 2.0             # [ARCHITECTURAL] Publication rate for UI
      global_frame: odom                 # [FIXED] Local costmap in odom frame
      robot_base_frame: base_link        # [FIXED]
      rolling_window: true               # [FIXED] Local costmap follows robot
      width: 3                           # [TUNABLE] [2-5] m — local costmap width
      height: 3                          # [TUNABLE] [2-5] m — local costmap height
      resolution: 0.05                   # [FIXED] 5cm cells (matches map resolution)
      footprint: "[[0.50, 0.37], [0.50, -0.37], [-0.30, -0.37], [-0.30, 0.37]]"  # [FIXED] Robot outline
      plugins: ["voxel_layer", "inflation_layer"]
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: true
        publish_voxel_map: false
        origin_z: 0.0
        z_resolution: 0.05              # [FIXED] Voxel height resolution
        z_voxels: 16                    # [FIXED] 16 voxels * 0.05m = 0.80m height range
        min_obstacle_height: 0.10       # [TUNABLE] [0.05-0.20] m — ignores ground noise below this
        max_obstacle_height: 2.0        # [FIXED] Ceiling height
        mark_threshold: 0
        observation_sources: scan depth
        scan:
          topic: /agv/scan              # [FIXED] From pointcloud_to_laserscan
          max_obstacle_height: 2.0
          min_obstacle_height: 0.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 3.0       # [TUNABLE] [2.0-5.0] m — max clearing ray length
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5       # [TUNABLE] [1.5-4.0] m — max marking range
          obstacle_min_range: 0.0
        depth:
          topic: /zed/zed_node/point_cloud/cloud_registered  # [FIXED] ZED depth
          max_obstacle_height: 2.0
          min_obstacle_height: 0.10     # [TUNABLE] [0.05-0.20] m — filter ground from depth
          clearing: true
          marking: true
          data_type: "PointCloud2"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.3
          obstacle_max_range: 2.5
          obstacle_min_range: 0.3       # [FIXED] ZED minimum depth range
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.0        # [TUNABLE] [1.0-5.0] — higher = faster cost falloff
        inflation_radius: 1.0           # [TUNABLE] [0.5-1.5] m — obstacle influence radius

/**/global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0             # [ARCHITECTURAL] Global costmap refresh (Hz)
      publish_frequency: 1.0            # [ARCHITECTURAL] Publication rate
      global_frame: map                 # [FIXED]
      robot_base_frame: base_link       # [FIXED]
      resolution: 0.05                  # [FIXED] Must match map resolution
      track_unknown_space: true         # [TUNABLE] Track vs ignore unknown cells
      footprint: "[[0.50, 0.37], [0.50, -0.37], [-0.30, -0.37], [-0.30, 0.37]]"  # [FIXED]
      plugins: ["static_layer", "voxel_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true   # [ARCHITECTURAL] Late subscriber support
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: true
        publish_voxel_map: false
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        min_obstacle_height: 0.10
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: scan
        scan:
          topic: /agv/scan
          max_obstacle_height: 2.0
          min_obstacle_height: 0.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.0
        inflation_radius: 1.0

/**/map_server:
  ros__parameters:
    yaml_filename: ""                   # [FIXED] Set via launch argument

/**/behavior_server:
  ros__parameters:
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0               # [ARCHITECTURAL] Recovery behavior rate
    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    wait:
      plugin: "nav2_behaviors/Wait"
