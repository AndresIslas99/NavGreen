# SLAM Toolbox — online async mapping with loop closure
#
# Used during mapping commissioning alongside scan_grid_mapper.
# scan_grid_mapper gives instant visual feedback; SLAM Toolbox produces
# the loop-closed occupancy grid for Nav2 navigation.
#
# In mapping mode: SLAM Toolbox publishes map→odom TF (EKF global disabled).
# In navigation mode: not used (EKF global owns map→odom from cuVSLAM).

slam_toolbox:
  ros__parameters:
    # Solver
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # Frames
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /agv/scan
    mode: mapping

    # Map resolution
    resolution: 0.05
    max_laser_range: 8.0
    minimum_time_interval: 0.5
    transform_timeout: 0.5
    tf_buffer_duration: 30.0

    # Keyframe thresholds — don't create new node until robot moves enough
    minimum_travel_distance: 0.3    # meters
    minimum_travel_heading: 0.3     # radians (~17°)

    # Scan matching
    use_scan_matching: true
    use_scan_barycenter: true
    scan_buffer_size: 10
    scan_buffer_maximum_scan_distance: 8.0

    # Loop closure
    do_loop_closing: true
    loop_search_maximum_distance: 5.0
    loop_match_minimum_chain_size: 3
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.35
    loop_match_minimum_response_fine: 0.45

    # Correlation search (scan matching parameters)
    correlation_search_space_dimension: 0.5
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1

    # Loop closure search
    loop_search_space_dimension: 8.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    # Distance/angle variance penalties
    distance_variance_penalty: 0.5
    angle_variance_penalty: 1.0
    fine_search_angle_offset: 0.00349     # ~0.2°
    coarse_search_angle_offset: 0.349     # ~20°
    coarse_angle_resolution: 0.0349       # ~2°

    # Map update
    map_update_interval: 2.0              # seconds between map publishes
    enable_interactive_mode: false

    # Threading
    stack_size_to_use: 40000000           # 40MB stack for solver

    # Don't publish TF — EKF global handles map→odom in navigation mode.
    # In mapping mode, this should be set to true via launch param override.
    # transform_publish_period: 0.0       # 0 = don't publish TF
