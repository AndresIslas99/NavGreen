# Nav2 HIL overrides — only parameters that differ from nav2_params.yaml
#
# Applied on top of the base config via: parameters=[nav2_params.yaml, nav2_hil_overrides.yaml]
# Later YAML values override earlier ones for matching keys.

/**/controller_server:
  ros__parameters:
    # Sim topic rates are lower (~11 Hz odom, ~17 Hz IMU), so 20 Hz controller
    # frequency from the base config was too aggressive. 10 Hz is conservative.
    controller_frequency: 10.0
    FollowPath:
      transform_tolerance: 0.5
      # RotationShim + MPPI params come from the base nav2_params.yaml.
      # No HIL-specific overrides needed for the controller itself — the
      # shim and MPPI work at 10 Hz just fine (MPPI model_dt=0.05s still
      # valid, controller just runs every other tick).

/**/local_costmap:
  local_costmap:
    ros__parameters:
      # HIL uses ObstacleLayer (no ZED point cloud from sim)
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /agv/scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55

/**/global_costmap:
  global_costmap:
    ros__parameters:
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /agv/scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55
