# SLAM Toolbox — localization mode (loop closure during navigation)
#
# Runs alongside the dual-EKF during autonomous navigation to provide
# scan-matching loop closure.  This bounds drift that cuVSLAM visual
# odometry alone cannot correct (featureless corridors, long routes).
#
# TF publishing is DISABLED — the global EKF owns map→odom.
# The node's corrected pose feeds the global EKF as an additional
# absolute pose source.
#
# Requires a pre-built serialized map:
#   map_file_name: /path/to/greenhouse_map   (without extension — _posegraph.data expected)

slam_toolbox:
  ros__parameters:
    # ── Mode ──
    mode: localization

    # Solver (same as mapping)
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # Frames
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /agv/scan

    # Map resolution (must match mapping config)
    resolution: 0.05
    max_laser_range: 8.0
    minimum_time_interval: 0.5
    transform_timeout: 0.5
    tf_buffer_duration: 30.0

    # Keyframe thresholds (same as mapping)
    minimum_travel_distance: 0.15
    minimum_travel_heading: 0.15

    # Scan matching
    use_scan_matching: true
    use_scan_barycenter: true
    scan_buffer_size: 10
    scan_buffer_maximum_scan_distance: 8.0

    # Loop closure — essential for localization mode
    do_loop_closing: true
    loop_search_maximum_distance: 5.0
    loop_match_minimum_chain_size: 3
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.35
    loop_match_minimum_response_fine: 0.45

    # Correlation search
    correlation_search_space_dimension: 0.5
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1

    # Loop closure search
    loop_search_space_dimension: 8.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    # Distance/angle variance penalties
    distance_variance_penalty: 0.5
    angle_variance_penalty: 1.0
    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.349
    coarse_angle_resolution: 0.0349

    # Map update
    map_update_interval: 2.0
    enable_interactive_mode: false

    # Threading
    stack_size_to_use: 40000000

    # Pre-built map for localization (override via launch argument)
    # Set to the serialized SLAM Toolbox map (without extension).
    # The node expects <map_file_name>_posegraph.data and .posegraph.
    map_file_name: ""
    map_start_at_dock: true

    # Don't publish TF — EKF global owns map→odom.
    transform_publish_period: 0.0
