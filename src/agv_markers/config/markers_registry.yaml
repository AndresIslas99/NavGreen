# AprilTag marker registry — known marker poses in map frame
# Family: tag36h11, tag face 0.20m × 0.20m (override per-tag via tag_size).
# Border plate 0.25m × 0.25m × 5 mm (OmniPBR white). Tag thickness 1 mm.
# Positions baked into agv-greenhouse-sim USD (greenhouse_with_robot.usd,
# operator-confirmed 2026-04-18). 36 tags total, IDs 0–37 (ID 32 unused).
#
# Categories (by z-height and purpose):
#   - wall (z=0.145m): drift-correction via agv_markers (global EKF hint)
#   - row_start (z=0.145m): vertical tags at x=7.40 (FRONT) and x=3.60 (REAR)
#     marking the start of each crop row — consumed by agv_markers.
#   - floor_rail_entry (z=0.002m): face-up tags at x=7.00 (FRONT entry) and
#     x=4.00 (REAR entry) used by agv_rail_approach for 2 cm alignment
#     before the robot enters a rail aisle.
# The type field is optional — defaults to wall/row_start/floor_rail_entry
# based on z-height and x-coordinate.

