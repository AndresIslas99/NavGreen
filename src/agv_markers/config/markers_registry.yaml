  # ── Rail entry floor tags (used by agv_rail_approach) ──
  # The 10 floor tags above (IDs 2,3,4,12,13 FRONT x=7.00; IDs 33,34,35,36,37
  # REAR x=4.00) are the approach targets for the RAIL_APPROACH mode. Robot
  # detects them at ~1.0–2.5 m range with the ZED mounted at z=0.21 m, drives
  # the final metre with the agv_rail_approach P-controller, settles, and
  # hands off to agv_rail_driver for the longitudinal traversal.
  # These entries are the floor tags listed above — no separate registry
  # block needed. Field-deploy surveyed positions override these values.
