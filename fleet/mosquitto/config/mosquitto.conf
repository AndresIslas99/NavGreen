# Mosquitto MQTT Broker — AGV Fleet
# VDA 5050 communication backbone

listener 1883
protocol mqtt

# WebSocket listener for browser-based fleet manager
listener 9001
protocol websockets

# Allow anonymous for local network (auth via VDA 5050 topic ACLs later)
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_type warning
log_type error
log_type notice

# Connection keepalive
max_keepalive 60

# Last Will detection (VDA 5050 connection topic)
# Handled by clients, not broker config
