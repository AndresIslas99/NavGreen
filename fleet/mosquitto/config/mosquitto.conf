# Mosquitto MQTT Broker — AGV Fleet
# VDA 5050 communication backbone

listener 1883
protocol mqtt

# WebSocket listener for browser-based fleet manager
listener 9001
protocol websockets

# --- Authentication --------------------------------------------------------
# DEFAULT: anonymous access, NO topic ACLs. This is only acceptable on the
# robot's isolated greenhouse LAN (see SECURITY.md): anyone who can reach
# port 1883/9001 can publish VDA 5050 orders and instant actions to every
# robot on the bus. The aclfile next to this config is INACTIVE until the
# `acl_file` directive below is enabled — ACL user/pattern rules match the
# MQTT username, so authentication must be enabled at the same time.
#
# To enable authentication + ACLs:
#   1. Create the password file (from the host, via the container):
#        docker exec agv-mqtt mosquitto_passwd -c /mosquitto/config/passwd fleet-manager
#        docker exec agv-mqtt mosquitto_passwd    /mosquitto/config/passwd <robot-serial>
#      (one entry per robot; the ACL expects each adapter's username to be
#      its VDA serial number, e.g. agv-001)
#   2. Give the Node services their credentials via environment:
#        fleet manager:   VDA_MQTT_USERNAME=fleet-manager  VDA_MQTT_PASSWORD=...
#        vda5050 adapter: VDA_MQTT_USERNAME=<robot-serial> VDA_MQTT_PASSWORD=...
#   3. Swap the directives below and restart the broker:
#allow_anonymous false
#password_file /mosquitto/config/passwd
#acl_file /mosquitto/config/aclfile
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_type warning
log_type error
log_type notice

# Connection keepalive
max_keepalive 60

# Last Will detection (VDA 5050 connection topic)
# Handled by clients, not broker config
