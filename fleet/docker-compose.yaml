# AGV Fleet Infrastructure
# Start with: docker compose up -d

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: agv-mqtt
    ports:
      # Set MQTT_BIND_ADDR to a specific interface (e.g. the robot-LAN IP) to
      # avoid exposing the broker on every host interface. Anonymous access is
      # the default (see mosquitto/config/mosquitto.conf) — never expose these
      # ports beyond the isolated greenhouse LAN.
      - "${MQTT_BIND_ADDR:-0.0.0.0}:1883:1883"   # MQTT
      - "${MQTT_BIND_ADDR:-0.0.0.0}:9001:9001"   # MQTT over WebSocket
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    restart: unless-stopped
