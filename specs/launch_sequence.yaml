# Known violations of launch ordering invariants
# ─────────────────────────────────────────────────────────────────────────────

known_issues:
  - issue: "safety_supervisor and cmd_vel_gate launch in parallel within safety.launch.py"
    location: "src/agv_safety/launch/safety.launch.py"
    status: "MITIGATED 2026-04-13 — safety_params.yaml startup_grace_ms=3000 gives the supervisor a publish window before the gate's watchdog can mark it silent."
    residual: "Ordering is still parallel; the grace window is the guard, not an explicit TimerAction."

  - issue: "teleop_server publishes maps/loaded ~10s after own start using AGV_BOOT_MAP_NAME"
    location: "src/agv_ui_backend/src/index.ts (bootMapName)"
    consequence: "If Nav2 map_server still configuring when this fires, orchestrator triggers before the map is actually loaded"
    fix: "Make teleop_server wait for /agv/map_server/load_map service to be ready before publishing."

  - issue: "No healthcheck that verifies lifecycle_manager_navigation reached active state"
    consequence: "Silent partial Nav2 bringup at boot — setMode('nav') is gated on is_active (fixed 2026-04-13), but nothing at startup verifies the lifecycle converged"
    fix: "agv_healthcheck.sh already checks collision_monitor presence; extend to verify lifecycle state via lifecycle_manager service."

  - issue: "agv_full.launch.py hil_mode contract diverges from agv_hil_full.launch.py"
    consequence: "Under AGV_MODE=hil_full there is no in-repo producer for /agv/wheel_odom and /agv/scan; the launch comments assume the sim still publishes them, contradicting the 2026-04-17 sim contract."
    fix: "Either port the agv_hil_bridges includes into agv_full.launch.py's hil branch, or update the sim contract. Tracked follow-up."

