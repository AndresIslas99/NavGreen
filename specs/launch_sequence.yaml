    - "src/agv_bringup/launch/nav.launch.py"
    - "src/agv_bringup/launch/hardware.launch.py"
    - "src/agv_bringup/launch/dashboard.launch.py"
    - "src/agv_bringup/launch/perception.launch.py"
    - "src/agv_bringup/launch/agv_teleop.launch.py"
    - "src/agv_bringup/launch/agv_robot_core.launch.py"
    - "src/agv_bringup/launch/agv_fusion.launch.py"
    - "src/agv_bringup/launch/agv_ekf_local_test.launch.py"
    - "src/agv_bringup/launch/agv_hil.launch.py"
  note: "Deleted in the audit/2026-04-13 branch. They were listed in agv_bringup/CLAUDE.md as entry points but were never invoked by agv_start.sh. Git log preserves them if they need to be revived. Only agv_full.launch.py, agv_mapping.launch.py, and agv_hil_full.launch.py remain."
