# ─────────────────────────────────────────────────────────────────────────────
# AGV Launch Sequence — agv_full.launch.py startup DAG
#
# Canonical ordering of node startup for the `real` mode entry point. Each
# node declares its preconditions (what must be ready before it can function),
# launch timing relative to launch_ros start, and failure mode (what depends
# on this node being up).
#
# `source:` fields carry file paths + human anchors, NOT line numbers — line
# numbers drift with every edit and verify_launch_sequence.py can only check
# file existence. Use the anchor text to grep inside the file.
#
# This replaces the tables in src/agv_bringup/CLAUDE.md which drift from
# the actual launch file.
# ─────────────────────────────────────────────────────────────────────────────

entry_points:

  production:
    systemd_unit: "agv.service"
    shell_script: "src/agv_bringup/scripts/agv_start.sh"
    env_vars:
      AGV_MODE: "real (default) | mapping | hil | hil_full"
      AGV_MAP: "optional — resolved from ~/.agv/last_map if absent, falls back to default_empty.yaml"
      AGV_DATA_DIR: "/home/orza/agv_data (default applied INSIDE agv_full.launch.py; agv_start.sh itself only mkdir-s the maps dir)"
      ROS_DOMAIN_ID: "42 — set via Environment= in agv.service (specs/project.yaml#deployment.ros_domain_id); agv_start.sh does not set it"
      RMW_IMPLEMENTATION: "rmw_cyclonedds_cpp (exported by agv_start.sh)"
      CYCLONEDDS_URI: "file:///tmp/agv_cyclonedds_runtime.xml — agv_start.sh generates this at boot from config/cyclonedds_production.xml (template)"
      AGV_ENABLE_FOXGLOVE: "optional; true appends enable_foxglove_bridge:=true"
    launch_file: "src/agv_bringup/launch/agv_full.launch.py"

  mapping_commissioning:
    launch_file: "src/agv_bringup/launch/agv_mapping.launch.py"
    note: "Invoked by agv_start.sh when AGV_MODE=mapping. Separate startup sequence, not covered by this spec."

  hil_simulation:
    launch_file: "src/agv_bringup/launch/agv_hil_full.launch.py"
    note: |
      Invoked by agv_start.sh when AGV_MODE=hil (map required). Minimal HIL
      brain stack WITH Jetson-side bridges: joint_states_to_wheel_odom
      produces /agv/wheel_odom from sim /agv/joint_states, and a Jetson-side
      pointcloud_to_laserscan produces /agv/scan — per the 2026-04-17 sim
      contract (agv-greenhouse-sim 3d44cec: sim stopped publishing anything
      the Jetson handles in production). Separate startup sequence, not
      covered by this spec.
    sim_host_companion:
      description: |
        HIL requires a second host (the sim host, a Linux PC with GPU) running
        Isaac Sim and the validation overlay. That stack lives in a separate
        git repo `agv-greenhouse-sim` and is NOT part of this workspace. It
        is documented here only for orchestration — the Jetson's launch does
        not spawn anything on the sim host.
      repo: "git@github.com:AndresIslas99/agv-greenhouse-sim.git"
      sim_host_entry_points:
        - step: 1
          terminal: "T1 (sim host)"
          command: "./run_isaac_supervised.sh"
          legacy_command: "./run_isaac_sim.sh (manual Play — deprecated after 2026-04-16)"
          auto_play: true
          auto_play_env_var: "AGV_AUTO_PLAY (default 1; set to 0 for manual Play)"
          supervisor: "relaunches Isaac on crash or on POST /sim/restart; downtime ~30–60 s"
          note: "Starts Isaac Kit under supervisor, loads greenhouse_with_robot.usd, boots sim_isaac_handler (in-Kit rclpy) for teleport + PhysX contact reports, and presses Play automatically."
        - step: 2
          terminal: "T2 (sim host)"
          command: "ros2 launch agv_isaac_sim isaac_hil.launch.py validation:=true enable_api:=true"
          args:
            validation: "true enables /agv/sim/* overlay (7 nodes)"
            enable_api: "true enables FastAPI sim_api on port 8090 of sim host"
          note: "Forces ROS_DOMAIN_ID=42 internally. Starts overlay + foxglove_bridge (port 8765) + drive chain."
        - step: 3
          terminal: "Jetson"
          command: "ros2 launch agv_bringup agv_hil_full.launch.py map:=<map_name>"
          note: "Brain-side stack. Must start AFTER sim T1+T2 or Nav2 hangs without /clock."
      http_timeline_control:
        description: "HTTP endpoints on sim_api (:8090 of sim host) for remote control by the LLM agent without rclpy/DDS."
        endpoints:
          - {method: "POST", path: "/sim/play", effect: "start the Isaac timeline (mirrors auto-play)"}
          - {method: "POST", path: "/sim/stop", effect: "pause physics + clock; does not kill the Kit process"}
          - {method: "POST", path: "/sim/restart", effect: "kills Isaac; supervisor relaunches with auto-play; returns immediately. LLM must poll GET /state until gt_pose is non-null (~30–60 s)."}
        topic_mirror: "/agv/sim/control (std_msgs/String JSON command=play|stop|pause) for play/stop; restart is not topic-exposed because it kills the Kit process."
      cross_distro_boundary:
        description: "sim host runs ROS 2 Humble; Jetson runs ROS 2 Jazzy. Cyclone DDS interops at wire level as long as only standard msg types cross."
        allowed_types: ["std_msgs/*", "geometry_msgs/*", "nav_msgs/*", "nav2_msgs/*", "sensor_msgs/*"]
        forbidden: "agv_interfaces/* and any other custom msg — IDL is not guaranteed byte-compatible across distros."
      dds_peer_list:
        file: "cyclonedds.xml (in sim repo)"
        must_contain: "Jetson IP (USB 192.168.55.1 preferred for stability; WiFi 192.168.15.241 fallback)"
        jetson_terminal_requirement: "any ros2 CLI terminal on the Jetson used for HIL verification must `export ROS_DOMAIN_ID=42` (default .bashrc is 0)."
      usd_staleness:
        warning: "After brain-parity refactor on 2026-04-15, the USD in sim repo is stale. Regenerate on sim host with `isaacsim --exec src/agv_isaac_sim/scripts/build_greenhouse_usd.py && isaacsim --exec src/agv_isaac_sim/scripts/import_robot_usd.py` before first Play of the day."

  hil_full_brain_validation:
    launch_file: "src/agv_bringup/launch/agv_full.launch.py (hil_mode:=true)"
    note: |
      Invoked by agv_start.sh when AGV_MODE=hil_full (map required). The
      PRODUCTION launch file with hardware-only nodes skipped (see
      condition_hil fields below). Used during PR validation sprints.
      CAUTION — known contract divergence: this file's comments expect the
      sim to publish /agv/wheel_odom and /agv/scan directly (it starts no
      Jetson-side bridges), while the 2026-04-17 sim contract in
      agv_hil_full.launch.py's header says the sim stopped publishing them.
      Reconciling the two HIL entry points is open follow-up work.

# ─────────────────────────────────────────────────────────────────────────────
# Node-by-node startup (relative to launch_ros t=0)
# ─────────────────────────────────────────────────────────────────────────────

sequence:

  # ── t = 0 seconds — immediately on launch_ros start ──

  - name: "agv_slam presence check (fail-fast)"
    package: "agv_bringup (OpaqueFunction _require_agv_slam)"
    source: "src/agv_bringup/launch/agv_full.launch.py (_require_agv_slam)"
    start_time_s: 0.0
    provides:
      - "hard failure at launch if the external agv_slam package is not installed (real mode)"
    condition_hil: "check skipped when hil_mode=true (cuVSLAM stack not started in HIL)"
    note: "agv_slam is an EXTERNAL deploy-time package (not in this workspace). Its greenhouse config override ships here at src/agv_bringup/config/cuvslam_greenhouse.yaml."

  - name: "robot_description_launch"
    package: "agv_description (delegated via description.launch.py)"
    source: "src/agv_bringup/launch/agv_full.launch.py (description.launch.py)"
    delegates_to: "src/agv_description/launch/description.launch.py"
    start_time_s: 0.0
    preconditions:
      - "URDF file exists at agv_description/urdf/agv.urdf.xacro"
    provides:
      - "robot_state_publisher node publishing TF base_link → wheel frames (static)"
      - "topic /robot_description"
    failure_impact: "No TF from base_link outward. Nav2 costmaps fail to compute footprint in world frame."

  - name: "agv_odrive_node"
    package: "agv_odrive (delegated via odrive.launch.py — two conditional includes)"
    source: "src/agv_bringup/launch/agv_full.launch.py (odrive.launch.py)"
    start_time_s: 0.0
    branch_logic:
      has_map_real: "include passes cmd_vel_topic:='cmd_vel_safe' (full safety chain in front)"
      no_map_real: "include passes cmd_vel_topic:='cmd_vel' (mapping-first, no safety chain)"
    preconditions:
      - "CAN bus can0 UP (setup by can-setup.service; agv_start.sh pre-flight checks it for real/mapping)"
      - "ODrive S1 firmware answering on CAN node IDs 0 and 1"
    provides:
      - "topic /agv/wheel_odom (50 Hz)"
      - "topic /agv/motor_state (JSON, includes feedback_ok)"
      - "topic /agv/drive_debug (JSON diagnostics)"
      - "cmd_vel → motor currents"
    failure_impact: "Robot cannot move. Wheel odometry missing → ekf_local degraded."
    condition_hil: "SKIPPED when hil_mode=true (both includes require hil_mode!=true — no CAN hardware; the sim closes the cmd_vel loop and emulates motor_state/drive_debug)."

  - name: "pointcloud_to_laserscan"
    package: "pointcloud_to_laserscan (external)"
    source: "src/agv_bringup/launch/agv_full.launch.py (pointcloud_to_laserscan)"
    start_time_s: 0.0
    preconditions:
      - "zed wrapper publishing /agv/zed/point_cloud/cloud_registered"
    provides:
      - "topic /agv/scan (LaserScan from ZED depth)"
    failure_impact: "collision_monitor scan_source stops. slam_toolbox stops receiving scans."
    condition_hil: |
      SKIPPED when hil_mode=true (UnlessCondition). Running the Jetson copy
      would subscribe to the raw point cloud over WiFi and saturate the
      radio. NOTE: this file then has NO /agv/scan producer of its own — see
      entry_points.hil_full_brain_validation for the known divergence with
      the 2026-04-17 sim contract (agv_hil_full.launch.py runs its own
      Jetson-side pointcloud_to_laserscan instead).

  - name: "image_server"
    package: "agv_image_server"
    source: "src/agv_bringup/launch/agv_full.launch.py (image_server)"
    start_time_s: 0.0
    provides:
      - "HTTP MJPEG stream on port 8091"
    failure_impact: "Dashboard camera view fails. Not safety-critical."
    condition_hil: "SKIPPED when hil_mode=true (no physical camera)."

  - name: "scan_grid_mapper"
    package: "agv_scan_mapper"
    source: "src/agv_bringup/launch/agv_full.launch.py (scan_grid_mapper)"
    start_time_s: 0.0
    provides:
      - "topic /agv/live_map (live occupancy grid while mapping)"
    failure_impact: "Dashboard live map view fails during mapping. Not safety-critical. Also feeds POST /api/maps/save (map_saver_cli reads /agv/live_map)."

  # ── t = 3.0 seconds ──

  - name: "zed_container + cuVSLAM (nvblox REMOVED Fase 7 F2)"
    package: "agv_slam (EXTERNAL deploy-time package; include of agv_slam.launch.py)"
    source: "src/agv_bringup/launch/agv_full.launch.py (agv_slam.launch.py)"
    start_time_s: 3.0
    condition_hil: "SKIPPED when hil_mode=true. ZED wrapper needs physical camera (dies with 'CAMERA NOT DETECTED' in sim)."
    preconditions:
      - "ZED 2i camera connected and detected by SDK"
      - "src/agv_bringup/config/cuvslam_greenhouse.yaml present (TF disabled via /**: key; passed as slam_params_override)"
    provides:
      - "topic /agv/zed/imu/data (200 Hz)"
      - "topic /agv/zed/depth/depth_registered"
      - "topic /agv/zed/point_cloud/cloud_registered"
      - "topic /agv/zed/pose_with_covariance + /agv/zed/pose/status (Area Memory Path A0 inputs)"
      - "topic /visual_slam/tracking/odometry (for ekf_global)"
      - "service /agv/zed/save_area_memory"
      - "service /agv/zed/reset_pos_tracking"
    failure_impact: "Visual perception fails. cuVSLAM odometry missing → ekf_global has only wheel odometry."
    removed_components:
      - component: "nvblox_node"
        removed_date: "2026-04-13"
        removed_in: "Fase 7 F2"
        reason: "9.6 GB RAM + 50% CPU during navigation. Not used in Nav2 costmap pipeline (see src/agv_navigation/CLAUDE.md — nvblox_layer removed from both costmaps)."
      - component: "slam_web_gui_node"
        removed_date: "2026-04-13"
        removed_in: "Fase 7 F1"
        reason: "94% CPU sustained. Dev-only FastAPI visualization tool, no ROS consumers outside its own subscribers, not in the dashboard."

  # ── t = 3.5 seconds ──

  - name: "imu_filter"
    package: "agv_sensor_fusion"
    source: "src/agv_bringup/launch/agv_full.launch.py (imu_filter)"
    start_time_s: 3.5
    preconditions:
      - "ZED IMU publishing on /agv/zed/imu/data"
    provides:
      - "topic /agv/imu/filtered (Butterworth-filtered IMU, SensorDataQoS)"
    failure_impact: "EKF filters ingest unfiltered vibration-contaminated IMU data. Pose estimate degraded at speed."
    note: "Must start BEFORE EKF or the filter has no history buffer."
    condition_hil: "SKIPPED when hil_mode=true (sim provides a pre-filtered IMU)."

  # ── t = 3.8 seconds ──

  - name: "wheel_slip_detector"
    package: "agv_sensor_fusion"
    source: "src/agv_bringup/launch/agv_full.launch.py (wheel_slip_detector)"
    start_time_s: 3.8
    preconditions:
      - "agv_odrive_node publishing /agv/wheel_odom"
      - "imu source publishing (yaw-rate residual input)"
    provides:
      - "topic /agv/wheel_odom_validated (covariance-inflated on caster slip — ekf_local odom0)"
      - "topic /agv/wheel_slip/state (JSON diagnostics)"
    failure_impact: "ekf_local loses its odom0 input (it consumes wheel_odom_validated, NOT wheel_odom directly) — local filter degraded to IMU only."

  - name: "caster_dwell_advisor"
    package: "agv_sensor_fusion"
    source: "src/agv_bringup/launch/agv_full.launch.py (caster_dwell_advisor)"
    start_time_s: 3.8
    provides:
      - "topic /agv/caster/dwell_state (advisory JSON — no runtime consumer yet)"
    failure_impact: "None — advisory diagnostic stream only."

  # ── t = 4.0 seconds ──

  - name: "ekf_local"
    package: "robot_localization (via agv_sensor_fusion fusion.launch.py include)"
    source: "src/agv_sensor_fusion/launch/fusion.launch.py"
    start_time_s: 4.0
    preconditions:
      - "imu_filter publishing"
      - "wheel_slip_detector publishing /agv/wheel_odom_validated"
    provides:
      - "TF odom → base_link (SOLE OWNER)"
      - "topic /agv/odometry/local"
    failure_impact: "TF chain broken. All nodes that need odom→base_link fail: Nav2 local_costmap, safety chain."
    note: "set_pose is remapped to ekf_local/set_pose so /agv/set_pose is served by ekf_global alone."

  - name: "ekf_global"
    package: "robot_localization (via agv_sensor_fusion fusion.launch.py include)"
    source: "src/agv_sensor_fusion/launch/fusion.launch.py"
    start_time_s: 4.0
    preconditions:
      - "ekf_local publishing"
      - "cuVSLAM publishing /visual_slam/tracking/odometry"
    provides:
      - "TF map → odom (SOLE OWNER)"
      - "topic /agv/odometry/global"
      - "service /agv/set_pose (SOLE server — used by marker_correction RELOC and auto_init)"
    failure_impact: "TF map→odom missing. Navigation cannot localize robot in map frame."

  - name: "fusion_monitor"
    package: "agv_sensor_fusion"
    source: "src/agv_sensor_fusion/launch/fusion.launch.py"
    start_time_s: 4.0
    provides:
      - "topic /agv/pose (PoseWithCovarianceStamped republish at 10 Hz)"
      - "topic /agv/cuvslam_tracking_ok (Bool health flag)"
      - "diagnostic about EKF health"

  # ── t = 4.5 seconds ──

  - name: "factor_graph"
    package: "agv_factor_graph"
    source: "src/agv_bringup/launch/agv_full.launch.py (factor_graph.launch.py)"
    start_time_s: 4.5
    mode: "parallel (publish_tf=false)"
    provides:
      - "topic /agv/factor_graph/odometry (validation only)"
    failure_impact: "None — validation node. Not in the critical path."

  # ── t = 5.0 seconds ──

  - name: "slam_toolbox_localization"
    package: "slam_toolbox (external)"
    source: "src/agv_bringup/launch/agv_full.launch.py (slam_toolbox)"
    start_time_s: 5.0
    condition: "IfCondition(enable_slam_localization), default=true"
    mode: "mapping mode with transform_publish_period=0.0 (TF disabled)"
    provides:
      - "loop closure over cuVSLAM drift"
      - "topic /map (separate from /agv/map — beware!)"
    failure_impact: "cuVSLAM accumulated drift not bounded. Localization degrades over long runs."

  - name: "map_manager"
    package: "agv_map_manager"
    source: "src/agv_bringup/launch/agv_full.launch.py (map_manager)"
    start_time_s: 5.0
    preconditions:
      - "AGV_DATA_DIR/maps/ exists and is writable"
    provides:
      - "service /agv/map_manager/save_map (name charset 1-64 [A-Za-z0-9_-])"
      - "service /agv/map_manager/load_map"
      - "service /agv/map_manager/update_zone (zone_id charset 1-64 [A-Za-z0-9_-])"
      - "topic /agv/maps/loaded (transient_local, once per successful load)"
      - "topic /agv/current_map (transient_local)"

  - name: "waypoint_manager"
    package: "agv_waypoint_manager"
    source: "src/agv_bringup/launch/agv_full.launch.py (waypoint_manager)"
    start_time_s: 5.0
    preconditions: []
    provides:
      - "services /agv/waypoint_manager/* (save/list/execute — exercised only by integration tests today)"
    note: |
      Auto-seeds its missions store as an EMPTY JSONL file if missing.
      KNOWN ISSUE: missions_file points into the agv_navigation install
      share, not AGV_DATA_DIR — see specs/persistence.yaml#known_issues.
      The dashboard uses its own executor + store instead.

  # ── t = 6.0 seconds ── (conditional)

  - name: "Nav2 stack"
    package: "agv_navigation (bundle)"
    source: "src/agv_bringup/launch/agv_full.launch.py (navigation.launch.py)"
    start_time_s: 6.0
    condition: "IfCondition(has_map)"
    includes:
      - "map_server"
      - "controller_server (RotationShim wrapping MPPI)"
      - "planner_server (SmacPlanner2D)"
      - "behavior_server"
      - "bt_navigator"
      - "velocity_smoother"
      - "collision_monitor"
      - "lifecycle_manager_navigation"
    preconditions:
      - "has_map=true"
      - "ekf_global publishing /agv/odometry/global"
      - "map file at AGV_MAP path"
    provides:
      - "topic /agv/cmd_vel_nav (controller output → mode_arbiter source)"
      - "topic /agv/cmd_vel_smoothed → /agv/cmd_vel_collision_safe (chain)"
      - "action /agv/navigate_to_pose"
      - "service /agv/map_server/load_map"
      - "service /agv/lifecycle_manager_navigation/is_active (setMode('nav') gate)"
    failure_impact: "Navigation disabled. Teleop still works through the arbiter/safety chain."
    condition_hil: "Active in hil_mode=true. hil_mode is forwarded to navigation.launch.py which layers collision_monitor_hil_overrides.yaml on top of the base config — drops collision_monitor.observation_sources.pointcloud_source so the Jetson does not try to consume /agv/zed/point_cloud over WiFi. scan_source stays active for HIL obstacle detection."

  # ── t = 6.5 seconds ── (conditional)

  - name: "agv_safety stack"
    package: "agv_safety (via safety.launch.py)"
    source: "src/agv_bringup/launch/agv_full.launch.py (safety.launch.py)"
    start_time_s: 6.5
    condition: "IfCondition(has_map)"
    includes:
      - "safety_supervisor_node (publishes /agv/safety/status)"
      - "cmd_vel_gate_node (consumes cmd_vel_collision_safe → cmd_vel_safe)"
    preconditions:
      - "collision_monitor publishing /agv/cmd_vel_collision_safe"
    provides:
      - "topic /agv/safety/status (10 Hz)"
      - "topic /agv/cmd_vel_safe (forwarded from gate)"
    failure_impact: "No cmd_vel reaches ODrive in has_map=true mode (gate is the last stage before the motor driver)."
    note: |
      Audit bug #1 ("gate watchdog fires before supervisor publishes,
      blocking teleop") FIXED 2026-04-13: safety_params.yaml
      startup_grace_ms=3000 covers the parallel start inside
      safety.launch.py, and the event-driven collision_monitor_state topic
      was removed from the supervisor's monitored list.

  # ── t = 7.0 seconds ── (conditional)

  - name: "apriltag_node + marker_correction + rail_approach"
    package: "multiple (apriltag_ros external, agv_markers, agv_rail_approach)"
    source: "src/agv_bringup/launch/agv_full.launch.py (apriltag_node)"
    start_time_s: 7.0
    condition: "IfCondition(enable_markers), default=true"
    preconditions:
      - "ZED camera_info publishing"
    provides:
      - "topic /agv/marker_pose"
      - "topic /agv/marker_raw_detected"
      - "service /agv/rail_approach/execute (+ abort, list_rail_starts)"
      - "topic /agv/rail_approach/state; cmd_vel remapped → /agv/cmd_vel_approach"

  # Iter-37: Phase 2 rail stack ported from agv_hil_full.launch.py.
  # zone_detector / rail_detector / mode_arbiter / rail_driver share the
  # t=7s slot since they all consume map→base TF + zone/rail topics that
  # the rest of the stack provides from earlier slots. Gated on has_map
  # (not enable_markers) because they are independent of AprilTags.
  - name: "zone_detector + rail_detector + mode_arbiter + rail_driver"
    package: "multiple (agv_zone_detector, agv_rail_detector, agv_mode_arbiter, agv_rail_driver)"
    source: "src/agv_bringup/launch/agv_full.launch.py (zone_detector)"
    start_time_s: 7.0
    condition: "IfCondition(has_map)"
    preconditions:
      - "ekf_global publishing /agv/odometry/global"
      - "Nav2 controller_server active (/agv/cmd_vel_nav)"
    provides:
      - "topic /agv/zone/state"
      - "topic /agv/rail_detections + /agv/rail_detector/state"
      - "topic /agv/rail_driver/state + /agv/rail_driver/goal + service /agv/rail_driver/cancel_goal"
      - "topic /agv/mode/state (the arbiter owns /agv/cmd_vel — see state_machine.yaml layer_5)"

  - name: "auto_init_orchestrator"
    package: "agv_localization_init"
    source: "src/agv_bringup/launch/agv_full.launch.py (auto_init_orchestrator)"
    start_time_s: 7.0
    # PR1: decoupled from enable_markers. Gated on has_map so the
    # orchestrator still runs when AprilTags are disabled; the existing
    # cascade falls through to Path B (last-known pose) → DEGRADED.
    condition: "IfCondition(has_map)"
    preconditions:
      - "map_manager publishing /agv/maps/loaded"
      - "cuVSLAM localize_in_map service available"
    provides:
      - "topic /agv/localization/state"
      - "service /agv/localization/reinitialize (returns 'Initialization already in progress' while a cascade runs)"

  - name: "behavior_executor (optional)"
    package: "agv_behaviors"
    source: "src/agv_bringup/launch/agv_full.launch.py (behavior_executor)"
    start_time_s: 7.0
    condition: "IfCondition(enable_behaviors), default=false"
    status: "NEVER ENABLED in practice — dead launch branch"

  # ── t = 7.5 seconds ── (conditional)

  - name: "foxglove_bridge (optional diagnostics)"
    package: "foxglove_bridge (external)"
    source: "src/agv_bringup/launch/agv_full.launch.py (foxglove_bridge)"
    start_time_s: 7.5
    condition: "IfCondition(enable_foxglove_bridge), default=false (AGV_ENABLE_FOXGLOVE=true in agv_start.sh)"
