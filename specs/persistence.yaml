# ─────────────────────────────────────────────────────────────────────────────
# Rules for adding new artifacts
# ─────────────────────────────────────────────────────────────────────────────

rules:

  - id: "R1-location"
    rule: "New persistent artifacts MUST live under ${AGV_DATA_DIR}."
    exception: "~/.agv/* (boot markers readable by shell scripts)"
    enforcement: "verify_no_hardcoded_paths.sh rejects /home/orza/ outside whitelist"

  - id: "R2-owner"
    rule: "Every artifact in this spec must have a single owner package."
    enforcement: "verify_persistence.py checks that the declared writer code_ref exists and contains a write operation"

  - id: "R3-symmetry"
    rule: "Every artifact written by a Save operation must be readable by its corresponding Load operation (symmetry)."
    current_violations: []
    resolved_violations:
      - "_meta.json asymmetry (audit bug #2) — resolved 2026-04-13 Fase 6 via /agv/localization/save_last_known_pose service called from map_manager::on_save_map."

  - id: "R4-atomicity"
    rule: "Writes that must survive crashes (last_map, _meta.json) MUST use atomic tmp+rename."
    enforcement: "code review; verify_persistence.py can grep for std::ofstream directly on these paths"

  - id: "R5-env_vs_param"
    rule: "Paths used BEFORE ROS is sourced (shell scripts) read env vars. Paths used AFTER ROS is sourced read ROS params or env vars. Avoid hardcoded strings in source code."
    enforcement: "verify_no_hardcoded_paths.sh"

# ─────────────────────────────────────────────────────────────────────────────
# Known issues (reported in audit, tracked for Fase 5/6)
# ─────────────────────────────────────────────────────────────────────────────
known_issues:
  - issue: "Hardcoded /home/orza/agv_data/maps/.current.area in 4 places"
    locations:
      - "src/agv_map_manager/src/map_manager_node.cpp:45 (ROS param default)"
      - "src/agv_slam/config/zed2i_override.yaml:38 (ZED wrapper pos_tracking.area_memory_db_path)"
      - "src/agv_localization_init/src/auto_init_orchestrator_node.cpp:131 (declare_parameter default)"
      - "src/agv_localization_init/src/auto_init_orchestrator_node.cpp:1001 (member initializer)"
    current_status: "Whitelisted in verify_no_hardcoded_paths.sh pending a proper refactor."
    fix: "Read AGV_DATA_DIR env var at construction and build the path programmatically. Tracked as Fase 6 follow-up (not critical-path but desirable for portability)."

  - issue: "map_manager_node.map_dir drift to install share"
    status: "FIXED 2026-04-13 Fase 7 F3"
    was: "agv_bringup/launch/agv_full.launch.py:53 set maps_dir = os.path.join(nav_dir, 'maps') where nav_dir is the colcon install share. This made map_manager_node write per-map sidecars (.area, _cuvslam/, _meta.json) into a read-only template directory while agv_ui_backend read/listed from AGV_DATA_DIR. Save/load asymmetry."
    now: "maps_dir = os.environ.get('AGV_DATA_DIR', '/home/orza/agv_data') + '/maps' — all consumers agree on the same canonical directory."
    evidence: "Live observation during 2026-04-13 trip: I2.area ended up in install/agv_navigation/share/agv_navigation/maps/ instead of /home/orza/agv_data/maps/."

  - issue: "/mnt/ssd is a bare directory, not a real mount — fake SSD"
    fix: "Fase 5 item 8: move session/log artifacts under AGV_DATA_DIR"

  - issue: "_meta.json asymmetry: written on shutdown only"
    status: "FIXED 2026-04-13 Fase 6 bug #2"
    fix: "Added /agv/localization/save_last_known_pose service in agv_localization_init; called synchronously from agv_map_manager::on_save_map after Area Memory flush."
