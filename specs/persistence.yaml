    writer: "src/agv_slam/scripts/session_recorder.py"
    format: "rosbag2 + SVO2 + TUM trajectory"
    migration: "Fase 5 item 8 — change src/agv_slam/config/recording.yaml:11"

  slam_logs:
    current_path: "/mnt/ssd/slam_logs/"
