spec_version: "2.1"
last_updated: "2026-07-06"
generated_from: "docs/audit/2026-04-13-full-audit.md#section-3 (+ 2026-07-06 SSOT reconciliation)"
verified_by: "tools/verify_specs/verify_persistence.py"

# ─────────────────────────────────────────────────────────────────────────────
# AGV Persistent Artifacts — canonical inventory
#
# Every file or folder the runtime stack writes to disk, its owner, readers,
# format, lifecycle, and the rules for extending the set.
#
# The ONLY canonical base directory is AGV_DATA_DIR, with a default of
# /home/orza/agv_data. Any new persistent artifact goes under AGV_DATA_DIR.
# ─────────────────────────────────────────────────────────────────────────────

base_directories:

  canonical_data:
    env_var: "AGV_DATA_DIR"
    default: "/home/orza/agv_data"
    owner: "agv_ui_backend (read), agv_map_manager (read+write), agv_localization_init (read+write)"
    description: "All application-level persistent artifacts."
    ownership: "orza:orza"
    permissions: "0755"
    rationale: "Single root for maps, events, settings, cuVSLAM DBs. Future SSD mount goes here to avoid path churn."

  boot_state:
    path: "~/.agv"
    owner: "agv_start.sh (read), agv_map_manager (write)"
    description: "State read by shell scripts BEFORE the ROS stack is sourced. Must be readable without ROS environment. Contains only small text markers."
    ownership: "orza:orza"
    permissions: "0755"

  ros_framework:
    path: "~/.ros/log"
    owner: "ROS 2 framework"
    description: "Launch logs. Rolling. Not managed by this project."

  systemd_journal:
    path: "/var/log/journal"
    owner: "systemd"
    description: "Service logs for agv.service, agv-watchdog.service, agv-healthcheck.service."

# ─────────────────────────────────────────────────────────────────────────────
# Per-map artifacts (the whole set for a single saved map <X>)
# ─────────────────────────────────────────────────────────────────────────────

per_map_artifacts:

  occupancy_grid_yaml:
    path_pattern: "${AGV_DATA_DIR}/maps/<X>.yaml"
    format: "Nav2 map metadata (YAML)"
    writer:
      package: "agv_map_manager"
      code_ref: "src/agv_map_manager/src/map_manager_node.cpp::on_save_map"
      mechanism: "invokes nav2_map_server/map_saver_cli"
    readers:
      - package: "nav2_map_server"
        role: "map_server/load_map service"
      - package: "agv_ui_backend"
        code_ref: "src/agv_ui_backend/src/routes/maps.ts"
        role: "list maps in /api/maps endpoint"
    lifecycle: "persistent"
    required: true

  occupancy_grid_pgm:
    path_pattern: "${AGV_DATA_DIR}/maps/<X>.pgm"
    format: "Portable GrayMap 8-bit"
    writer:
      package: "agv_map_manager"
      code_ref: "src/agv_map_manager/src/map_manager_node.cpp::on_save_map"
      mechanism: "invokes nav2_map_server/map_saver_cli"
    readers:
      - package: "nav2_map_server"
      - package: "agv_ui_backend"
        code_ref: "src/agv_ui_backend/src/routes/maps.ts (sharp conversion)"
    lifecycle: "persistent"
    required: true

  cuvslam_keyframe_db:
    path_pattern: "${AGV_DATA_DIR}/maps/<X>_cuvslam/"
    format: "Isaac ROS cuVSLAM binary keyframe database (folder)"
    writer:
      package: "agv_map_manager"
      code_ref: "src/agv_map_manager/src/map_manager_node.cpp::save_cuvslam_map"
      mechanism: "service call /visual_slam/save_map"
    readers:
      - package: "agv_localization_init"
        code_ref: "src/agv_localization_init/src/auto_init_orchestrator_node.cpp::on_maps_loaded Path A"
        role: "/visual_slam/load_map before localize_in_map"
    lifecycle: "persistent"
    required: false
    note: "Missing on maps saved before cuVSLAM integration. auto_init falls through to Path B if absent."

  zed_area_memory:
    path_pattern: "${AGV_DATA_DIR}/maps/<X>.area"
    format: "ZED SDK binary Area Memory landmark database"
    writer:
      package: "agv_map_manager"
      code_ref: "src/agv_map_manager/src/map_manager_node.cpp::copy_landing_pad_to_per_map"
      mechanism: "copy .current.area landing pad after /agv/zed/save_area_memory service call"
    readers:
      - package: "agv_map_manager"
        code_ref: "src/agv_map_manager/src/map_manager_node.cpp::swap_area_memory_for_map on Load Map"
        role: "swapped onto landing pad before reset_pos_tracking"
    lifecycle: "persistent"
    required: false
    note: "Per-map file. Landing pad is the ZED wrapper interface; per-map file is the persistence mechanism."

  last_known_pose_meta:
    path_pattern: "${AGV_DATA_DIR}/maps/<X>_meta.json"
    format: 'JSON {"x": float, "y": float, "theta": float, "saved_at": unix_seconds, "reason": string}'
    writer:
      package: "agv_localization_init"
      code_ref: "src/agv_localization_init/src/auto_init_orchestrator_node.cpp"
      mechanism: "on orchestrator shutdown, periodic save (30s), AND synchronously when map_manager calls /agv/localization/save_last_known_pose during on_save_map"
    readers:
      - package: "agv_localization_init"
        code_ref: "src/agv_localization_init/src/auto_init_orchestrator_node.cpp"
        role: "fallback pose when Paths A0/A/B fail (try_last_known_pose, Path C)"
    lifecycle: "persistent"
    required: false
    note: "Save/load symmetry fixed 2026-04-13 Fase 6 bug #2 — was previously only written on shutdown/periodic. Now also written synchronously on Save Map via the new /agv/localization/save_last_known_pose service."

# ─────────────────────────────────────────────────────────────────────────────
# Global artifacts (not per-map)
# ─────────────────────────────────────────────────────────────────────────────

global_artifacts:

  zed_area_landing_pad:
    path: "${AGV_DATA_DIR}/maps/.current.area"
    format: "ZED SDK binary Area Memory (same as per-map)"
    writers:
      - package: "zed_components (ZED wrapper — EXTERNAL, patched fork)"
        external: true
        external_ref: "zed-ros2-wrapper fork (deploy-time package, NOT in this workspace): zed_components/src/zed_camera/src/zed_camera_component.cpp::callback_saveAreaMemory"
        mechanism: "service /agv/zed/save_area_memory (operator-triggered or periodic auto-save)"
      - package: "agv_map_manager"
        code_ref: "src/agv_map_manager/src/map_manager_node.cpp::swap_area_memory_for_map"
        mechanism: "cp <X>.area → .current.area on Load Map"
    readers:
      - package: "zed_components (ZED wrapper — EXTERNAL, patched fork)"
        external: true
        external_ref: "zed-ros2-wrapper fork (deploy-time package, NOT in this workspace): zed_components/src/zed_camera/src/zed_camera_component.cpp::startPosTracking"
        role: "re-read on each reset_pos_tracking to hot-swap landmarks"
    lifecycle: "session (overwritten on every map load)"
    required: false
    note: |
      This is the ZED wrapper's view of the landmark DB. The wrapper fork is
      patched to re-read pos_tracking.area_memory_db_path live so file swaps
      via reset_pos_tracking take effect. The wrapper source tree is
      installed on the Jetson at deploy time and is not part of this repo —
      writer/reader refs are marked external:true so verify_persistence.py
      does not expect the files here.

  zones_json:
    path: "${AGV_DATA_DIR}/maps/zones.json"
    format: "JSON lines (one zone per line: zone_id, type, polygon_x, polygon_y)"
    writer:
      package: "agv_map_manager"
      code_ref: "src/agv_map_manager/src/map_manager_node.cpp::on_update_zone"
      mechanism: "atomic tmp+rename (writes zones.json.tmp, then fs::rename) — R4-atomicity compliant"
    validation: "zone_id must be 1-64 chars of [A-Za-z0-9_-] (agv_map_manager::is_safe_name); rejected with 'Invalid zone_id (allowed: 1-64 chars of [A-Za-z0-9_-])'"
    readers:
      - package: "agv_map_manager (self, for CRUD)"
      - package: "Nav2 costmap filters (future integration)"
    lifecycle: "persistent"
    required: false

  dashboard_missions_json:
    path: "${AGV_DATA_DIR}/missions/missions.json"
    format: "JSON array of Mission objects (seeded with '[]' on first run)"
    writer:
      package: "agv_ui_backend"
      code_ref: "src/agv_ui_backend/src/routes/missions.ts"
    readers:
      - package: "agv_ui_backend"
        role: "REST /api/missions CRUD + executeMission"
    lifecycle: "persistent"
    required: false
    note: "This is the dashboard's mission store — the one operators actually use."

  waypoint_manager_missions_store:
    path: "<agv_navigation install share>/missions/missions.json (NOT under AGV_DATA_DIR — see known_issues)"
    format: "line-delimited JSON (one mission object per line); seeded as an EMPTY file, not '[]' — a '[]' stub would be neither a JSON array nor valid JSONL"
    writer:
      package: "agv_waypoint_manager"
      code_ref: "src/agv_waypoint_manager/src/waypoint_manager_node.cpp"
      mechanism: "creates parent dir + zero-byte seed at startup if missing; appends one JSON object per saved mission"
    readers:
      - package: "agv_waypoint_manager"
        role: "list/execute services (exercised only by integration tests today)"
    lifecycle: "persistent (but lives in the colcon install share — wiped on clean rebuild)"
    required: false
    note: |
      Separate from dashboard_missions_json and format-incompatible with it
      (JSONL vs JSON array). Do NOT point both writers at one file. The
      install-share location violates R1-location; tracked in known_issues.

  last_map_marker:
    path: "${HOME}/.agv/last_map"
    format: "Plain text, single line, map name (no extension)"
    writer:
      package: "agv_map_manager"
      code_ref: "src/agv_map_manager/src/map_manager_node.cpp::persist_last_map"
      mechanism: "atomic tmp+rename on maps/loaded event"
    readers:
      - package: "agv_bringup (shell script)"
        code_ref: "src/agv_bringup/scripts/agv_start.sh"
        role: "resolve AGV_MAP before ROS starts"
    lifecycle: "persistent"
    required: false
    note: "Deliberately lives outside AGV_DATA_DIR so shell script can read it without sourcing ROS."

  event_log:
    path: "${AGV_DATA_DIR}/events.jsonl"
    format: "JSONL {timestamp, severity, subsystem, text}"
    writer:
      package: "agv_ui_backend"
      code_ref: "src/agv_ui_backend/src/event_log.ts::EventLog.emit"
    readers:
      - package: "agv_ui_backend"
        role: "REST /api/events and dashboard event pane"
    lifecycle: "rolling (30 days via AGV_RETENTION_DAYS env var)"
    required: false

  telemetry_db:
    path: "${AGV_DATA_DIR}/telemetry.db"
    format: "SQLite 3 (time-series metrics)"
    writer:
      package: "agv_ui_backend"
      code_ref: "src/agv_ui_backend/src/telemetry_store.ts"
    readers:
      - package: "agv_ui_backend"
        role: "REST /api/analytics"
    lifecycle: "rolling (30 days)"
    required: false

  users_json:
    path: "${AGV_DATA_DIR}/users.json"
    format: |
      JSON object {enabled: bool, jwt_secret: string, token_expiry: string,
      users: [{username, role, password_hash}]}. password_hash is
      "scrypt:<salt>:<hash>" (legacy unsalted sha256 accepted and upgraded
      transparently on login). Auto-created on first run with
      enabled=false, users=[] and file mode 0600. No default users ship.
    writer:
      package: "agv_ui_backend"
      code_ref: "src/agv_ui_backend/src/auth.ts"
      also: "src/agv_ui_backend/src/tools/adduser.ts (npm run adduser -- <user> <pass> <role>)"
    readers:
      - package: "agv_ui_backend"
        role: "auth enable flag + JWT validation"
    lifecycle: "persistent"
    required: false

  apriltag_registry:
    path: "${AGV_DATA_DIR}/apriltags.json"
    format: "JSON of defined tags and hardware assignments"
    writer:
      package: "agv_ui_backend"
      code_ref: "src/agv_ui_backend/src/apriltag_manager.ts"
    readers:
      - package: "marker_correction_node (via runtime registry YAML file)"
      - package: "agv_ui_backend (UI)"
    lifecycle: "persistent"
    required: false

  runtime_markers_registry:
    path: "${AGV_DATA_DIR}/runtime_markers_registry.yaml"
    format: "YAML dict of marker_id → {pose, size, type}"
    writer:
      package: "agv_ui_backend"
      code_ref: "src/agv_ui_backend/src/apriltag_manager.ts::writeRegistry"
    readers:
      - package: "agv_markers"
        code_ref: "src/agv_markers/src/marker_correction_node.cpp"
      - package: "agv_rail_approach"
        code_ref: "src/agv_rail_approach/src/rail_approach_node.cpp"
    lifecycle: "persistent"
    required: false

  home_point_json:
    path: "${AGV_DATA_DIR}/home_point.json"
    format: 'JSON {"x": float, "y": float, "theta": float, "set_at": unix_s, "name": str}'
    writer:
      package: "agv_ui_backend"
      code_ref: "src/agv_ui_backend/src/routes/home_point.ts"
      mechanism: "PUT /api/home_point, atomic tmp+rename"
    readers:
      - package: "agv_ui_backend"
        role: "GET /api/home_point + status broadcast + POST /api/home_point/go nav goal"
    lifecycle: "persistent"
    required: false
    note: "Operator-defined base/dock pose. POST /api/home_point/go dispatches a navigate_to_pose action goal to this pose (reuses existing nav interface — no new DDS contract). No implicit default: if file is absent, IR A BASE button stays disabled rather than navigating to map origin."

  semantic_zones_yaml:
    path: "${AGV_DATA_DIR}/zones.yaml"
    format: "YAML [{name, label, polygon: [{x,y}…], color, kind}]"
    writer:
      package: "agv_ui_backend"
      code_ref: "src/agv_ui_backend/src/routes/zones.ts"
      mechanism: "PUT /api/zones, atomic tmp+rename"
    readers:
      - package: "agv_ui_backend"
        role: "GET /api/zones for dashboard semantic overlay"
    lifecycle: "persistent"
    required: false
    note: "Distinct from zones_json above (Nav2 costmap traffic zones). This is the operator-facing labeled overlay: BASE DE CARGA, ZONA DE TRABAJO A, ESTACIONAMIENTO. If file absent, GET returns {zones: []} with 200 (graceful degradation — frontend draws nothing)."

  greenhouse_geometry_yaml:
    path: "${AGV_DATA_DIR}/greenhouse_geometry.yaml"
    format: 'YAML {aisles: {count, spacing_m, half_width_m}, sections: {rear: {x_start, x_end}, front: {x_start, x_end}}, corridor: {x_start, x_end}, rail: {gauge_m}}'
    writer:
      package: "agv_ui_backend"
      code_ref: "src/agv_ui_backend/src/routes/greenhouse_geometry.ts"
      mechanism: "PUT /api/greenhouse/geometry, atomic tmp+rename"
    readers:
      - package: "agv_ui_backend"
        role: "GET /api/greenhouse/geometry for dashboard reactive geometry"
      - package: "agv_zone_detector"
        code_ref: "src/agv_zone_detector/src/zone_detector_node.cpp"
      - package: "agv_rail_driver"
        code_ref: "src/agv_rail_driver/src/rail_driver_node.cpp"
      - package: "agv_mode_arbiter"
        code_ref: "src/agv_mode_arbiter/src/mode_arbiter_node.cpp"
    lifecycle: "persistent"
    required: false
    note: "SSOT for the greenhouse's physical layout — aisle count, aisle spacing in Y, half-width of the rail centerline band, X-bounds of REAR/CORRIDOR/FRONT sections, rail gauge. Previously hardcoded constants lived in zone_classifier_impl.hpp and mirrored in the dashboard's greenhouseGeometry.ts; this artifact unifies them. Each ROS consumer loads at boot (not hot-reload — requires service restart). If the file is absent, each consumer falls back to its hardcoded defaults so the system never breaks; the dashboard's GET returns the defaults too. Edits via dashboard apply visually immediately; navigation picks them up on next restart."

# ─────────────────────────────────────────────────────────────────────────────
# Config artifacts (versioned in repo, loaded by multiple consumers)
# ─────────────────────────────────────────────────────────────────────────────
# Build-time config that lives in source control AND is loaded at runtime by
# more than one node. The SSOT discipline: one writer (the repo file), many
# readers; verify_geometry_ssot.py enforces consumers do not re-declare the
# same values.

config_artifacts:

  robot_geometry:
    path: "src/agv_description/config/robot_geometry.yaml"
    format: "flat ROS 2 `/**:` parameter YAML"
    writer:
      package: "agv_description"
      code_ref: "src/agv_description/config/robot_geometry.yaml"
      mechanism: "hand-edited, versioned"
    readers:
      - package: "agv_description"
        code_ref: "src/agv_description/launch/description.launch.py"
        role: "passes wheel_radius / left_wheel_y / right_wheel_y / wheel_z / wheel_width as xacro args to robot_state_publisher"
      - package: "agv_odrive"
        code_ref: "src/agv_odrive/launch/odrive.launch.py"
        role: "chained before odrive_params.yaml so geometry SSOT wins; consumed by odrive_can_node"
      - package: "agv_sim"
        code_ref: "src/agv_sim/config/sim_controllers.yaml"
        role: "diff_drive_controller wheel_separation/wheel_radius mirror the SSOT values (sim reuses the real geometry)"
    lifecycle: "persistent"
    required: true
    note: |
      Single source of truth for kinematic geometry — wheel_radius,
      track_width, gear_ratio, and the URDF wheel-mount offsets derived
      from them. Created in Sprint A of the 2026-05-13 audit to close
      CRITICAL-02-02 (six conflicting sources of wheel_radius across
      URDF, odrive_params.yaml, robot_params.yaml, C++ defaults, nav2
      footprint, and HIL bridge). CLOSED numerically by the SSOT-revert
      sprint: the ODrive NVRAM dump disproved the firmware-bug
      hypothesis (stock M8325s values, no hidden gearing), the 10:1
      gearbox was confirmed by manual rotation (9.841 motor turns per
      wheel turn), and the wheel radius vernier-measured at 0.0625 m.
      The file holds the geometric truth: 0.0625 / 0.735 / 10.0.
      Evidence: docs/audit/2026-05-13-pre-phase1-verification.md §F1,
      docs/calibration/odrive_nvram_dump_2026-05-13.txt.

# ─────────────────────────────────────────────────────────────────────────────
# Event-triggered recording artifacts (Sprint D, MEDIUM-10-04)
# ─────────────────────────────────────────────────────────────────────────────
# When agv_full.launch.py is invoked with enable_event_recording:=true, an
# ExecuteProcess runs `ros2 bag record --snapshot-mode --storage mcap` for
# the safety-critical topic list. Flushes a bag to disk only when its
# /rosbag2_recorder/snapshot service is called (manual or, in a future
# commit, by the backend on a /agv/safety/status transition).

recording_artifacts:

  rosbag2_snapshot:
    path_pattern: "${AGV_DATA_DIR}/bags/snapshot_<rosbag2_timestamp>"
    format: "MCAP (rosbag2 storage plugin)"
    writer:
      package: "agv_bringup (ExecuteProcess in agv_full.launch.py)"
      code_ref: "src/agv_bringup/launch/agv_full.launch.py"
      mechanism: "ros2 bag record --snapshot-mode; flushed by /rosbag2_recorder/snapshot service call"
    readers:
      - package: "operator / engineer (Foxglove Studio replay)"
        role: "post-mortem analysis of field events"
    lifecycle: "persistent until manual cleanup (no rotation policy yet — tracked)"
    required: false
    note: |
      enable_event_recording defaults to false. The recorder uses ~32 MB
      of memory continuously. Trigger a dump via:
        ros2 service call /rosbag2_recorder/snapshot std_srvs/srv/Trigger

      MEDIUM-10-04 ships the recorder; auto-trigger from the backend on
      /agv/safety/status transitions is a follow-up.

# ─────────────────────────────────────────────────────────────────────────────
# HIL validation artifacts (not iterated by verify_persistence.py)
# ─────────────────────────────────────────────────────────────────────────────
# Separate top-level section because these artifacts are either (a) written
# by integration tests — which only exist at test time — or (b) located on
# the sim host, outside this workspace's writable surface. Declared here for
# traceability, not for the verifier's code_ref check.

hil_artifacts:

  brain_side_precision_report:
    path_pattern: "${AGV_DATA_DIR}/sim_episodes/precision_run_<ts>/report.json"
    format: 'JSON {"waypoints": [{"goal", "gt_final", "brain_final", "err_xy", "err_yaw", "brain_drift", "status", "bag_path", "events_slice"}], "summary": {"p95_err_xy", "max_err_xy", "success_rate"}}'
    writer:
      package: "agv_integration_tests"
      test_ref: "src/agv_integration_tests/test/test_waypoint_precision.py"
      mechanism: "written at end of test_waypoint_precision run"
    readers:
      - package: "agv_integration_tests"
        test_ref: "src/agv_integration_tests/test/test_full_flow.py"
        role: "consumed for summary.json consolidation"
      - package: "(human/LLM agent)"
        role: "iteration loop reads p95 and event distribution to pick tuning actions"
    lifecycle: "persistent (one dir per run, not rotated)"
    required: false

  brain_side_full_flow_summary:
    path_pattern: "${AGV_DATA_DIR}/sim_episodes/full_flow_<ts>/summary.json"
    format: 'JSON {"map_name", "map_fidelity": {...}, "waypoint_precision": {...}, "pass": bool}'
    writer:
      package: "agv_integration_tests"
      test_ref: "src/agv_integration_tests/test/test_full_flow.py"
    readers:
      - package: "(CI / PR review)"
        role: "merge gate evidence"
    lifecycle: "persistent"
    required: false

  brain_side_map_diff_report:
    path_pattern: "${AGV_DATA_DIR}/sim_episodes/<run>/map_diff_<map_name>.json"
    format: 'JSON {"centroid_errors_m", "ious", "corridor_slack", "free_space_precision", "free_space_recall", "pass": bool}'
    writer:
      package: "agv_integration_tests"
      tool_ref: "src/agv_integration_tests/scripts/map_diff.py"
    readers:
      - package: "agv_integration_tests"
        test_ref: "src/agv_integration_tests/test/test_full_flow.py"
    lifecycle: "persistent"
    required: false

  sim_host_episode_rosbags:
    path_pattern: "/tmp/agv_runs/<episode_id>/ (on sim host, NOT on brain)"
    format: "rosbag2 (mcap or sqlite3)"
    writer:
      host: "sim_host"
      package: "sim_host:agv_sim_validation"
      node: "episode_tracker"
      note: "Not tracked by verify_persistence.py — path lives outside AGV_DATA_DIR on a different host."
    readers:
      - package: "(human/LLM agent via sim_api GET /episodes/{id}/bag)"
        role: "postmortem for failed runs; rsync to brain-side archive before sim host reboot (volatile path)"
    lifecycle: "volatile (sim host /tmp — lost on reboot). For permanent archive: rsync -av /tmp/agv_runs/ ~/agv_runs_archive/$(date +%F)/ on sim host."
    required: false
    rotation_policy:
      max_episode_duration_s: 600
      max_episode_size_mb: 500
      total_cap_gb: 10
      enforcement: "episode_tracker node in sim repo (not enforced by this spec)"

# ─────────────────────────────────────────────────────────────────────────────
# Session artifacts (non-canonical, scheduled for cleanup in Fase 5)
# ─────────────────────────────────────────────────────────────────────────────

# NOTE 2026-07-06: the agv_slam package was extracted from this workspace —
# it is now an external deploy-time package installed on the Jetson (its
# greenhouse override config ships here as
# src/agv_bringup/config/cuvslam_greenhouse.yaml). The writers below live in
# that external tree; the migration item follows the package.

session_artifacts_to_migrate:

  session_recordings:
    current_path: "/mnt/ssd/sessions/"
    target_path: "${AGV_DATA_DIR}/sessions/"
    writer: "agv_slam/scripts/session_recorder.py (EXTERNAL — agv_slam is a deploy-time package, not in this repo)"
    format: "rosbag2 + SVO2 + TUM trajectory"
    migration: "Fase 5 item 8 — change agv_slam/config/recording.yaml in the external package"

  slam_logs:
    current_path: "/mnt/ssd/slam_logs/"
    target_path: "${AGV_DATA_DIR}/slam_logs/"
    writer: "agv_slam/src/pipeline_watchdog_node.cpp (EXTERNAL — agv_slam is a deploy-time package, not in this repo)"
    migration: "Fase 5 item 8"

# ─────────────────────────────────────────────────────────────────────────────
# Rules for adding new artifacts
# ─────────────────────────────────────────────────────────────────────────────

rules:

  - id: "R1-location"
    rule: "New persistent artifacts MUST live under ${AGV_DATA_DIR}."
    exception: "~/.agv/* (boot markers readable by shell scripts)"
    enforcement: "verify_no_hardcoded_paths.sh rejects /home/orza/ outside whitelist"

  - id: "R2-owner"
    rule: "Every artifact in this spec must have a single owner package."
    enforcement: "verify_persistence.py checks that the declared writer code_ref exists and contains a write operation"

  - id: "R3-symmetry"
    rule: "Every artifact written by a Save operation must be readable by its corresponding Load operation (symmetry)."
    current_violations: []
    resolved_violations:
      - "_meta.json asymmetry (audit bug #2) — resolved 2026-04-13 Fase 6 via /agv/localization/save_last_known_pose service called from map_manager::on_save_map."

  - id: "R4-atomicity"
    rule: "Writes that must survive crashes (last_map, _meta.json) MUST use atomic tmp+rename."
    enforcement: "code review; verify_persistence.py can grep for std::ofstream directly on these paths"

  - id: "R5-env_vs_param"
    rule: "Paths used BEFORE ROS is sourced (shell scripts) read env vars. Paths used AFTER ROS is sourced read ROS params or env vars. Avoid hardcoded strings in source code."
    enforcement: "verify_no_hardcoded_paths.sh"

