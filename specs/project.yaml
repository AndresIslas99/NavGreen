spec_version: "2.1"
last_updated: "2026-07-06"
last_audit: "2026-05-13"
audit_document: "docs/audit/2026-04-13-full-audit.md (full) + docs/audit/2026-05-13-greenhouse-hardening/ (hardening)"

project:
  id: "agv-greenhouse-mvp"
  name: "AGV Greenhouse MVP for First Site Visit"
  status: "post_audit_hardening — core stack implemented and HIL-validated; field validation on physical robot pending"
  primary_goal: "Deliver a field-ready AGV that can be teleoperated from a local tablet, build and load a map, execute waypoint missions, and show live status during the first greenhouse visit."
  success_definition:
    - "Operator can control robot from browser over local WiFi"
    - "Robot can create and save a valid map"
    - "Robot can reload map and localize reliably"
    - "Robot can execute waypoint mission autonomously"
    - "Operator can trigger E-stop from dashboard"
    - "System runs for 30 minutes demo without technical intervention"

deployment_targets:
  development:
    compute: "Jetson AGX Orin 64GB"
    role: "current MVP and field commissioning target"
  production:
    compute: "Jetson Orin NX 16GB"
    role: "future production optimization target after MVP stability is proven"

# ─────────────────────────────────────────────────────────────────────────────
# Canonical deployment constants — the ONE place where literal values live.
# Other specs reference these keys instead of repeating the literal:
#   specs/state_machine.yaml → invariant single_source_of_domain
#   specs/persistence.yaml    → base_directories.canonical_data
#   specs/launch_sequence.yaml→ entry_points.production.env_vars
# ─────────────────────────────────────────────────────────────────────────────
deployment:
  ros_domain_id: 42
  rationale_domain_id: |
    Domain 42 isolates the production robot from any other ROS 2 participant
    on the LAN or the l4tbr0 USB bridge (dev PCs default to domain 0). See
    docs/audit/2026-04-13-full-audit.md section 6, bug #4 for the incident
    that motivated this choice (ghost sim_*/teleop nodes from a dev PC).
  default_data_dir: "/home/orza/agv_data"
  default_dashboard_port: 8090
  default_image_server_port: 8091
  default_fleet_manager_port: 8092
  default_namespace: "agv"
  can_interface: "can0"
  cyclonedds_uri: "file:///tmp/agv_cyclonedds_runtime.xml (generated at boot by agv_start.sh from src/agv_bringup/config/cyclonedds_production.xml)"

environment:
  site_type: "commercial greenhouse"
  operational_risks:
    - "repetitive crop rows reduce visual feature diversity"
    - "lighting changes across the day"
    - "moving leaves and workers create dynamic scene elements"
    - "reflective or wet surfaces can degrade visual tracking"
  mitigations_required:
    - "stereo-inertial SLAM mode"
    - "wheel odometry fused at all times"
    - "AprilTags used as pose anchors, not as sole localization method"
    - "mapping runs performed when dynamic activity is minimal"
    - "re-mapping process documented for crop growth or layout changes"

robot:
  kinematics: "differential_drive"
  # Single source of truth for kinematic geometry (wheel_radius, track_width,
  # gear_ratio + URDF wheel-mount offsets), added in Sprint A of the
  # 2026-05-13 audit to close CRITICAL-02-02. See
  # specs/persistence.yaml#config_artifacts.robot_geometry.
  kinematics_ssot_file: "src/agv_description/config/robot_geometry.yaml"
  traction:
    controller: "ODrive S1"
    motors: "2x M8325s BLDC"
    can_bus:
      bitrate_kbps: 250
      connector: "JST-GH 4-pin"
  perception:
    camera: "ZED 2i"
    visual_slam: "cuVSLAM stereo-inertial"
    imu_source: "ZED 2i IMU"
    marker_system:
      type: "AprilTag"
      family: "tag36h11"
  localization:
    fusion: "robot_localization dual EKF"
    odometry_sources:
      - "wheel encoders from ODrive"
      - "ZED 2i IMU"
      - "visual SLAM"
    architecture:
      local_filter: "odom -> base_link from wheel odometry + IMU"
      global_filter: "map -> odom from visual SLAM and optional marker correction"
  navigation:
    stack: "Nav2"
    # Updated 2026-04-13 audit: SmacPlanner2D + MPPI per nav2_params.yaml.
    # Previous entries (Smac Hybrid-A* / Regulated Pure Pursuit) were stale
    # from before commit a8180b7 (collision_monitor hardening + MPPI).
    planner: "SmacPlanner2D"
    controller: "RotationShim wrapping MPPI (nav2_rotation_shim_controller::RotationShimController, primary_controller nav2_mppi_controller::MPPIController)"
    behavior_tree: "custom forward-only (src/agv_navigation/behavior_trees/navigate_to_pose_forward_only.xml)"
    dynamic_obstacle_handling:
      - "Nav2 Collision Monitor (two-source: scan + pointcloud)"
      - "agv_safety cmd_vel_gate as final stage"
    costmap_filters:
      - "keepout zones (future — zones.json integration)"
      - "speed zones (future)"

commissioning_protocol:
  mapping_speed_mps:
    min: 0.3
    max: 0.5
  mapping_rules:
    - "perform at least one full pass through each operational corridor"
    - "prefer multiple passes in both directions to improve loop closure"
    - "perform mapping when traffic and dynamic obstacles are minimal"
    - "save map revision with timestamp and site identifier"
    - "document whether occupancy grid is derived from slam_toolbox, nvblox slice, or another canonical pipeline"
  field_calibration:
    - "measure real wheel radius"
    - "measure real track width"
    - "verify encoder ticks per revolution from hardware config"
    - "validate camera extrinsics in TF tree"
    - "validate map, odom, base_link, and sensor frame consistency"

scope:
  in_scope:
    - id: "teleop_web"
      package: "agv_ui_backend"  # Fixed 2026-04-13: was "agv_teleop" which never existed.
      outcome: "Web joystick sends cmd_vel over local WiFi"
    - id: "slam_mapping"
      package: "agv_slam"
      outcome: "Create, save, and load 2D occupancy map"
    - id: "map_editing"
      package: "agv_map_manager"
      outcome: "Edit keepout zones and speed zones from web UI"
    - id: "waypoint_selection"
      package: "agv_waypoint_manager"
      outcome: "Click on map and save waypoint or mission"
    - id: "autonomous_navigation"
      package: "agv_navigation"
      outcome: "Robot reaches goals autonomously without collision"
    - id: "mission_execution"
      package: "agv_behaviors"
      outcome: "Execute waypoint sequences through behavior tree"
    - id: "live_monitoring"
      package: "agv_ui_backend"
      outcome: "Robot pose, path, map, and state visible in browser"
    - id: "marker_localization"
      package: "agv_markers"
      outcome: "AprilTags correct global pose drift"
    - id: "wheel_odometry"
      package: "agv_odrive"
      outcome: "Wheel odometry published at required rate"

  experimental_opt_in:
    # Shipped in the repo but NOT part of the robot runtime stack or the
    # MVP acceptance surface. Started manually (fleet/start_fleet.sh or the
    # fleet/systemd units); interfaces registered in specs/interfaces.yaml.
    - id: "fleet_management"
      location: "fleet/agv_fleet_manager (REST/WS :8092, VDA 5050 master over MQTT)"
    - id: "vda5050_interoperability"
      location: "fleet/agv_vda5050_adapter (VDA 5050 2.0 adapter bridging MQTT ↔ ROS 2)"

  out_of_scope:
    - "full simulation and virtual commissioning"
    - "battery automation"
    - "Open-RMF integration"
    - "certified functional safety"
    - "automatic docking and charging"

hard_constraints:
  languages:
    ros2_robot_nodes: "C++17 only"
    ui_backend: "TypeScript"
    web_frontend: "TypeScript/React"
    offline_tooling: "Python allowed"
  policies:
    - "No hardcoded physical parameters"
    - "No hardcoded IPs"
    - "No hardcoded marker IDs in source code"
    - "No ROS2 robot node in Python"
    - "All runtime configuration must come from YAML or environment"
    - "Warnings are treated as errors"
    - "Do not claim software-only collision handling is certified safety"

canonical_terms:
  marker_term: "AprilTag"
  deprecated_terms:
    - "QR marker"
    - "ArUco"
  goal_dispatch:
    type: "action"
    canonical_interface: "/navigate_to_pose"
  robot_namespace:
    source: "parameter"
    default: "agv"

phases:
  # Statuses refreshed 2026-07-06 to match the tree. "done" = implemented
  # and exercised (HIL and/or bench); field validation on the physical robot
  # is tracked separately by phase_6_integration.
  - id: "phase_1_foundation"
    sequence: 1
    status: "done"
    depends_on: []
    packages:
      - "agv_description"
      - "agv_odrive"
      - "agv_bringup"
    gate: "wheel_odom published coherently at 50Hz and robot moves under CLI teleop"
    notes: |
      CAN bus working (devmem pinmux + systemd service). ODrive S1 C++17
      production node in place (odrive_can_node: 50 Hz wheel_odom,
      motor_state with feedback_ok watchdog, drive_debug). URDF/TF via
      agv_description. Python odrive tooling retained as dev_only.

  - id: "phase_2_perception"
    sequence: 2
    status: "done"
    depends_on: ["phase_1_foundation"]
    packages:
      - "agv_slam (external deploy-time package; greenhouse config in agv_bringup)"
      - "agv_sensor_fusion"
    gate: "2D map visible and robot relocalizes after save/load"
    notes: |
      cuVSLAM pipeline operational (nvblox removed Fase 7 F2 for resource
      reasons). Dual EKF implemented in agv_sensor_fusion (ekf_local
      odom→base_link, ekf_global map→odom) plus imu_filter,
      wheel_slip_detector, caster_dwell_advisor, fusion_monitor.

  - id: "phase_3_navigation"
    sequence: 3
    status: "done"
    depends_on: ["phase_2_perception"]
    packages:
      - "agv_navigation"
      - "agv_behaviors"
      - "agv_map_manager"
    gate: "robot navigates from A to B and stops or reroutes around obstacle"
    notes: "Nav2 (SmacPlanner2D + RotationShim/MPPI, collision monitor, forward-only BT) configured and exercised in HIL waypoint-precision runs."

  - id: "phase_4_markers"
    sequence: 4
    status: "done"
    depends_on: ["phase_3_navigation"]
    packages:
      - "agv_markers"
      - "agv_localization_init"
    gate: "AprilTag correction yields pose error under 5 cm"
    notes: "marker_correction + runtime registry + auto_init cascade (Paths A0/A/B/C) implemented; gate measured in HIL, field measurement pending."

  - id: "phase_5_dashboard"
    sequence: 5
    status: "done"
    depends_on: ["phase_3_navigation"]
    packages:
      - "agv_ui_backend"
      - "agv_waypoint_manager"
      - "web/agv_dashboard"
    gate: "full operator workflow works from tablet without terminal"
    notes: "REST/WS backend + React dashboard + auth (scrypt users.json). Mission execution runs through the backend's TS executor; the C++ waypoint_manager unification is Fase 8 follow-up."

  - id: "phase_6_integration"
    sequence: 6
    status: "in_progress"
    depends_on:
      - "phase_4_markers"
      - "phase_5_dashboard"
    packages: ["all"]
    gate: "30-minute end-to-end demo passes without technical intervention"
    notes: "HIL full-flow gate green (specs/acceptance.yaml#hil_validation); the on-site 30-minute demo on the physical robot has not been performed yet."

  - id: "phase_7_rail_navigation"
    sequence: 7
    status: "done"
    depends_on: ["phase_3_navigation", "phase_4_markers"]
    packages:
      - "agv_mode_arbiter"
      - "agv_zone_detector"
      - "agv_rail_approach"
      - "agv_rail_detector"
      - "agv_rail_driver"
      - "agv_safety"
    gate: "arbiter-owned cmd_vel: corridor Nav2 → rail approach → rail drive → exit, with collision BLOCKED_HANDOFF"
    notes: "Phase-2 rail stack (see specs/state_machine.yaml layer_5_runtime_arbiter) integrated into agv_full.launch.py at t=7s. Safety chain (supervisor + cmd_vel_gate) active in has_map mode."

  - id: "phase_audit_2026_04_13"
    sequence: 99
    status: "done"
    depends_on: []
    packages: ["all"]
    gate: "All verify_specs checks pass + teleop works end-to-end post-audit"
    notes: |
      Full audit + restructure triggered by accumulation of ad-hoc fixes across
      the reboot-to-production / Area Memory / safety chain iterations. Six
      sub-phases: Fase 0 (freeze), 1 (audit doc), 2 (specs as SSOT),
      3 (enforcement scripts), 4 (documentation restructure), 5 (fix violators),
      6 (resolve latent bugs). Completed; followed by the 2026-05-13
      greenhouse-hardening audit and the 2026-07-06 SSOT reconciliation.

post_audit_invariants:
  - "Every persistent artifact under AGV_DATA_DIR (no hardcoded /home/orza/ in src/)"
  - "Every ROS topic/service crossing package boundaries declared in specs/interfaces.yaml"
  - "Every package with C++ code has -Werror"
  - "Every .py node launched in production has dev_only: true OR is ported to C++17"
  - "Every package in src/agv_* has CLAUDE.md and TASK.yaml"
  - "pre-commit hook runs tools/verify_specs/all.sh"
  - "AGENT_INSTRUCTIONS.md exists and is referenced from root CLAUDE.md"
