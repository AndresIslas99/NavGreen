name: AGV Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  spec-verification:
    # The specs in specs/*.yaml are the repo's single source of truth;
    # tools/verify_specs/all.sh is the same BLOCKING suite the pre-commit
    # hook runs. Verifiers are stdlib-only Python/bash.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - name: Run SSOT verifiers
        run: bash tools/verify_specs/all.sh

  build-and-test:
    runs-on: ubuntu-22.04
    container:
      image: ros:humble
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y python3-colcon-common-extensions python3-rosdep
          rosdep init || true  # base image already ships a default sources list
          rosdep update
          # Resolve the whole workspace so cross-package depends
          # (e.g. agv_bringup -> agv_mode_arbiter) count as local packages.
          # Skipped keys need vendor installs (NVIDIA Isaac ROS, ZED SDK,
          # GTSAM); the packages that require them are not built in CI — see
          # the build step below.
          rosdep install --from-paths src --ignore-src -y \
            --skip-keys="isaac_ros_visual_slam isaac_ros_visual_slam_interfaces isaac_ros_nvblox isaac_ros_apriltag_interfaces zed_msgs gtsam"

      - name: Build AGV packages
        # 20 of 24 first-party packages build in CI. Excluded, all traceable
        # to three vendor SDKs unavailable on the public apt index:
        #   agv_map_manager       — isaac_ros_visual_slam_interfaces (Isaac ROS)
        #   agv_localization_init — zed_msgs (ZED ROS2 wrapper)
        #   agv_factor_graph      — gtsam
        #   agv_bringup           — declares all three above as runtime deps,
        #                           so colcon cannot resolve it without them
        run: |
          source /opt/ros/humble/setup.bash
          colcon build \
            --packages-select agv_interfaces agv_odrive \
              agv_waypoint_manager agv_markers agv_behaviors \
              agv_sensor_fusion agv_navigation \
              agv_description agv_mode_arbiter agv_integration_tests \
              agv_hil_bridges agv_rail_driver agv_ui_backend agv_zone_detector \
              agv_safety agv_scan_mapper agv_image_server agv_rail_detector \
              agv_rail_approach agv_hw_interface \
            --cmake-args -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_FLAGS="-Werror" \
            --event-handlers console_direct+
        shell: bash

      - name: Run tests
        run: |
          source /opt/ros/humble/setup.bash
          source install/setup.bash
          colcon test \
            --packages-select agv_odrive agv_interfaces \
              agv_waypoint_manager agv_markers agv_behaviors agv_mode_arbiter \
              agv_rail_driver agv_zone_detector agv_sensor_fusion \
              agv_safety agv_scan_mapper agv_image_server agv_rail_detector \
              agv_rail_approach agv_hw_interface \
            --event-handlers console_direct+
          colcon test-result --all --verbose
        shell: bash

  typescript-build:
    runs-on: ubuntu-22.04
    # rclnodejs compiles native bindings against a sourced ROS 2 install,
    # so the Node packages that depend on it must build inside ros:humble.
    container:
      image: ros:humble
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install ROS interface dependencies
        # rclnodejs generates its TypeScript bindings at npm-install time
        # from the interfaces available in the sourced ROS environment, so
        # nav2_msgs and the workspace's agv_interfaces must be present
        # before `npm ci` runs.
        run: |
          apt-get update
          apt-get install -y ros-humble-nav2-msgs python3-colcon-common-extensions
          source /opt/ros/humble/setup.bash
          colcon build --packages-select agv_interfaces
        shell: bash

      - name: Build UI backend
        working-directory: src/agv_ui_backend
        run: |
          source /opt/ros/humble/setup.bash
          source "$GITHUB_WORKSPACE/install/setup.bash"
          npm ci
          npm run build
        shell: bash

      - name: Build and test dashboard
        working-directory: web/agv_dashboard
        run: |
          npm ci
          npx tsc --noEmit
          npm test
          npx vite build
        shell: bash

      - name: Build and test fleet packages
        run: |
          source /opt/ros/humble/setup.bash
          cd fleet/agv_vda5050_adapter && npm ci && npm run build && cd ../..
          cd fleet/agv_fleet_manager && npm ci && npm run build && npm test
        shell: bash
